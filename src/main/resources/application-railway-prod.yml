spring:
  datasource:
    url: jdbc:postgresql://${RAILWAY_DB_HOST}:${RAILWAY_DB_PORT}/${RAILWAY_DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${RAILWAY_DB_USER}
    password: ${RAILWAY_DB_PASSWORD}
  liquibase:
    enabled: true
    change-log: classpath:db/schema/changelog.yml
    default-schema: public
    label-filter: DDL,DML
    drop-first: false
